<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Management System</title>
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 Course Management System</h1>
        </div>
        <div class="content">
            <div class="tabs">
                <button class="nav-item active" data-tab="students">Students</button>
                <button class="nav-item" data-tab="instructors">Instructors</button>
                <button class="nav-item" data-tab="courses">Courses</button>
                <button class="nav-item" data-tab="enrollment">Enrollment</button>
            </div>

            <!-- Students Tab -->
            <div id="students" class="tab-content active">
                <div class="section">
                    <h2>Add Student</h2>
                    <form id="student-form" class="form-group">
                        <input type="number" id="s-id" placeholder="Student ID" required>
                        <input type="text" id="s-name" placeholder="Student Name" required>
                        <input type="email" id="s-email" placeholder="Email" required>
                        <button type="submit">Add Student</button>
                    </form>
                </div>
                <div class="section">
                    <h2>Students List</h2>
                    <div class="filter-box">
                        <input type="text" id="search-students" placeholder="Search students...">
                    </div>
                    <table id="students-table">
                        <thead>
                            <tr><th>ID</th><th>Name</th><th>Email</th><th>Action</th></tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>

            <!-- Instructors Tab -->
            <div id="instructors" class="tab-content">
                <div class="section">
                    <h2>Add Instructor</h2>
                    <form id="instructor-form" class="form-group">
                        <input type="number" id="i-id" placeholder="Instructor ID" required>
                        <input type="text" id="i-name" placeholder="Instructor Name" required>
                        <button type="submit">Add Instructor</button>
                    </form>
                </div>
                <div class="section">
                    <h2>Instructors List</h2>
                    <table id="instructors-table">
                        <thead>
                            <tr><th>ID</th><th>Name</th></tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>

            <!-- Courses Tab -->
            <div id="courses" class="tab-content">
                <div class="section">
                    <h2>Add Course</h2>
                    <form id="course-form" class="form-group">
                        <input type="number" id="c-id" placeholder="Course ID" required>
                        <input type="text" id="c-name" placeholder="Course Name" required>
                        <button type="submit">Add Course</button>
                    </form>
                </div>
                <div class="section">
                    <h2>Courses List</h2>
                    <table id="courses-table">
                        <thead>
                            <tr><th>ID</th><th>Course Name</th></tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>

            <!-- Enrollment Tab -->
            <div id="enrollment" class="tab-content">
                <div class="section">
                    <h2>Enroll Student in Course</h2>
                    <form id="enroll-form" class="form-group">
                        <input type="number" id="e-student" placeholder="Student ID" required>
                        <input type="number" id="e-course" placeholder="Course ID" required>
                        <button type="submit">Enroll</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Notification Area -->
    <div id="notification-area"></div>

    <script src="app.js"></script>
</body>
</html>
